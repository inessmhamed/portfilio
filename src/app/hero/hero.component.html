<header class="hero bg-gradient-to-br from-blue-600 via-purple-600 to-pink-500 text-white py-20 px-6 md:px-12 lg:px-20 relative overflow-hidden">
  <!-- Animated background elements -->
  <div class="absolute inset-0 opacity-10">
    <div class="absolute top-10 left-10 w-32 h-32 bg-white rounded-full floating-element"></div>
    <div class="absolute top-32 right-20 w-24 h-24 bg-white rounded-full floating-element" style="animation-delay: 1s;"></div>
    <div class="absolute bottom-20 left-1/4 w-20 h-20 bg-white rounded-full floating-element" style="animation-delay: 2s;"></div>
  </div>

  <div class="max-w-7xl mx-auto flex flex-col lg:flex-row items-center justify-between gap-12 relative z-10" @heroAnimation>
    <div class="hero-info text-center lg:text-left max-w-2xl" @textAnimation>
      <h1 class="text-5xl md:text-6xl lg:text-7xl font-bold mb-4 bg-gradient-to-r from-white to-blue-100 bg-clip-text text-transparent hero-title">
        Mhamed Ines
      </h1>
      <h3 class="text-xl md:text-2xl lg:text-3xl font-semibold mb-6 text-blue-100 hero-subtitle">
        {{ translationService.translate('hero.subtitle') }}
      </h3>
      <p class="text-lg md:text-xl mb-4 text-blue-50 font-medium hero-description">
        {{ translationService.translate('hero.details') }}
      </p>
      <p class="text-base md:text-lg mb-8 text-blue-100 leading-relaxed hero-description">
        {{ translationService.translate('hero.summary') }}
      </p>
      <div class="hero-actions flex flex-col sm:flex-row gap-4 justify-center lg:justify-start hero-buttons">
        <a href="#contact" class="bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-8 rounded-full transform hover:scale-105 transition-all duration-300 shadow-lg hover:shadow-xl">
          {{ translationService.translate('hero.contactButton') }}
        </a>
        <a href="https://www.linkedin.com/in/mhamed-ines/" target="_blank" class="bg-white/20 hover:bg-white/30 text-white font-bold py-3 px-8 rounded-full backdrop-blur-sm border border-white/30 transform hover:scale-105 transition-all duration-300 shadow-lg hover:shadow-xl">
          {{ translationService.translate('hero.linkedInButton') }}
        </a>
      </div>
    </div>

    <div class="hero-avatar">
      <div class="relative">
        <div class="absolute inset-0 bg-gradient-to-r from-blue-400 to-purple-500 rounded-full blur-xl opacity-50 animate-pulse"></div>
        <img
          src="assets/iness.jpeg"
          alt="Mhamed Ines profile"
          class="relative w-64 h-64 md:w-80 md:h-80 rounded-full object-cover border-4 border-white shadow-2xl transform hover:scale-105 transition-all duration-500"
        >
      </div>
    </div>
  </div>
</header>
