<section
  id="skills"
  class="section py-16 px-6 md:px-12 lg:px-20 bg-gradient-to-br from-gray-50 to-blue-50"
>
  <div class="max-w-7xl mx-auto">
    <h2
      class="text-4xl md:text-5xl font-bold text-center mb-12 animate-fade-in"
      style="color: #19236e !important"
    >
      {{ translationService.translate("skills.title") }}
    </h2>

    <!-- Skills Grid -->
    <div class="skills-container mt-10">
      <div class="grid">
        <div class="skill-box" *ngFor="let group of skillGroups">
          <h3>
            <span class="icon">{{ group.icon }}</span>
            {{ group.title }}
          </h3>

          <div class="tags">
            <span class="tag" *ngFor="let skill of group.skills">
              {{ skill }}
            </span>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
