<section id="skills" class="section py-16 px-6 md:px-12 lg:px-20 bg-gradient-to-br from-gray-50 to-blue-50">
  <div class="max-w-7xl mx-auto">
    <h2 class="text-4xl md:text-5xl font-bold text-center mb-12 animate-fade-in" style="color: #19236e !important;">{{ translationService.translate('skills.title') }}</h2>


    <!-- Skills Grid -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mt-10">
      <div
        class="skill-card"
        *ngFor="let skill of skills; let i = index"
        [style.transform]="cardTransforms[i] || 'perspective(1000px) rotateX(0deg) rotateY(0deg)'"
        [style.box-shadow]="cardShadows[i] || '0 10px 22px rgba(15, 23, 42, 0.06)'"
        (mousemove)="onMouseMove($event, i)"
        (mouseleave)="onMouseLeave(i)"
      >
        <div class="skill-top">
          <img
            *ngIf="skill.icon && skill.icon.startsWith('http')"
            class="skill-icon"
            [src]="skill.icon"
            [alt]="skill.name + ' logo'"
            [style.transform]="'scale(' + (iconScales[i] || 1) + ')'"
            loading="lazy"
          />
          <div
            *ngIf="skill.icon && !skill.icon.startsWith('http')"
            class="skill-icon emoji-icon"
            [style.transform]="'scale(' + (iconScales[i] || 1) + ')'"
          >
            {{ skill.icon }}
          </div>
          <div class="skill-label">
            <h4>{{ skill.name }}</h4>
            <p>{{ skill.category | titlecase }}</p>
          </div>
        </div>
        <div class="skill-footer">
          <div class="strength-label">{{ translationService.translate('skills.expertise') }}</div>
          <div class="strength-stars" [ngClass]="getCategoryColor(skill.category)">
            <span *ngFor="let i of [1,2,3,4,5]" [class.filled]="i <= dotsActive(skill.level)"></span>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
