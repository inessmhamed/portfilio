<section id="experience" class="section section-alt py-16 px-3 md:px-10 lg:px-10">
  <div class="max-w-7xl mx-auto">
    <h2 class="text-4xl md:text-5xl font-bold text-center mb-16" style="color: #19236e !important;">{{ translationService.translate('experience.title') }}</h2>
    <div class="timeline">
      <div class="timeline-line"></div>
      <article
        class="timeline-item"
        #timelineItem
        *ngFor="let exp of experiences; let i = index"
      >
        <div class="timeline-content">
          <div class="timeline-header pt-3 flex items-center justify-between mb-1">
            <span class="text-xs text-primary font-semibold">{{ exp.period }}</span>
          </div>
          <h3 class="text-2xl font-bold mb-1 text-gray-800 leading-tight">{{ exp.role }}</h3>
          <p class="text-sm text-gray-500 mb-1">{{ exp.company }} · {{ exp.location }}</p>
          <p class="text-gray-600 mb-2 leading-relaxed text-justify">{{ exp.summary }}</p>

          <div class="flex flex-wrap gap-2 mb-4" *ngIf="exp.technologies?.length">
            <span *ngFor="let tech of exp.technologies" class="bg-blue-100 text-blue-800 text-xs font-medium px-2.5 py-0.5 rounded-full">
              {{ tech }}
            </span>
          </div>

        </div>
      </article>
    </div>
  </div>
</section>
